<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Défi Maths - TBI</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        /* =========================================
           STYLE GÉNÉRAL & STRUCTURE
           ========================================= */
        * { box-sizing: border-box; touch-action: manipulation; font-family: 'Fredoka', sans-serif !important; user-select: none; }
        body { margin: 0; padding: 0; width: 100vw; height: 100vh; overflow: hidden; background-color: #a8d8ff; }

        /* MODIFICATION : Ajout du défilement et alignement haut pour éviter la troncature */
        .screen { 
            display: none !important; 
            position: absolute; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: 10; 
            background: #a8d8ff; 
            overflow-y: auto; 
            padding: 20px;
        }
        .screen.active { 
            display: flex !important; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; /* Aligne vers le haut pour ne pas cacher le titre */
            z-index: 20; 
        }

        /* BOUTONS SUPERIEURS */
        .top-controls {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            z-index: 100;
        }

        .top-btn { 
            font-size: 1.2rem; 
            background: rgba(255, 255, 255, 0.8); 
            border: 2px solid rgba(0,0,0,0.15); 
            padding: 8px 15px; 
            border-radius: 12px; 
            cursor: pointer; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            color: #333; 
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        /* --- Menus --- */
        .menu-title { font-size: 4rem; color: #1565C0; margin-bottom: 10px; text-shadow: 3px 3px 0 white; text-align: center; margin-top: 40px;}
        .menu-subtitle { font-size: 2rem; color: #1976D2; margin-bottom: 30px; text-align: center;}
        
        .menu-grid { display: flex; flex-direction: column; gap: 15px; width: 90%; max-width: 650px; }
        .game-type-btn { display: flex; align-items: center; padding: 15px 25px; background: white; border: 4px solid #fff; border-radius: 25px; box-shadow: 0 6px 0 rgba(0,0,0,0.1); cursor: pointer; text-align: left; width: 100%; }
        .game-type-btn span { font-size: 4rem; margin-right: 25px; }
        .btn-text h3 { font-size: 2rem; margin: 0; color: #333; }
        .btn-text p { font-size: 1.3rem; margin: 0; color: #666; }

        .grid-buttons { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 90%; max-width: 800px; }
        .big-btn { background: white; border: none; border-radius: 20px; padding: 20px; font-size: 1.8rem; font-weight: bold; box-shadow: 0 5px 0 rgba(0,0,0,0.2); cursor: pointer; color: #333; display:flex; flex-direction:column; align-items:center; justify-content: center; text-align: center;}
        .big-btn span.icon { font-size: 3rem; margin-bottom: 5px; }

        /* --- MODE DUEL --- */
        .duel-container { display: flex; width: 100%; height: 100%; padding: 15px; padding-top: 60px; gap: 15px; overflow: hidden; }
        .player-column { flex: 0 0 30%; display: flex; flex-direction: column; background: rgba(255, 255, 255, 0.95); border-radius: 15px; padding: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .player-column.left { border: 5px solid #ef9a9a; background: #ffebee; }
        .player-column.right { border: 5px solid #90caf9; background: #e3f2fd; }
        .center-column { flex: 1; background: white; border-radius: 15px; border: 5px solid #fff; position: relative; overflow: hidden; display: flex; flex-direction: column; }
        .player-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .score-badge { font-size: 2.5rem; font-weight: bold; background: white; padding: 2px 15px; border-radius: 15px; box-shadow: 0 3px 0 rgba(0,0,0,0.1);}
        .question-card { background: white; padding: 15px; border-radius: 15px; border: 3px solid rgba(0,0,0,0.1); min-height: 100px; display: flex; align-items: center; justify-content: center; }
        .question-text { font-size: 3.5rem; font-weight: 800; color: #333; }
        .answer-input { width: 100%; height: 70px; background: white; border: 4px solid #ccc; border-radius: 15px; margin-bottom: 15px; font-size: 3.5rem; text-align: center; line-height: 60px; font-weight: bold; color: #333; }
        .numpad { flex-grow: 1; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .num-btn { background: white; border: 2px solid #bbb; border-radius: 12px; font-size: 2.5rem; font-weight: bold; cursor: pointer; box-shadow: 0 4px 0 #ccc; color: #444; display: flex; align-items: center; justify-content: center; }

        /* --- VISUELS ORIGINAUX --- */
        .game-visual-area { flex-grow: 1; position: relative; width: 100%; height: 100%; overflow: hidden; }
        .tug-wrapper { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; position: relative; background: #e0f7fa; }
        .rope-line { width: 100%; height: 18px; background: repeating-linear-gradient(45deg, #8d6e63, #8d6e63 15px, #6d4c41 15px, #6d4c41 30px); border-radius: 8px; position: relative; }
        .rope-knot { position: absolute; top: 50%; left: 50%; width: 50px; height: 50px; background: #d32f2f; border-radius: 50%; transform: translate(-50%, -50%); border: 5px solid white; transition: left 0.5s cubic-bezier(0.34, 1.56, 0.64, 1); z-index: 5; }
        
        .pole-wrapper { display: flex; height: 100%; padding: 0 10px; background: linear-gradient(to top, #81c784, #e8f5e9); }
        .pole-lane { flex: 1; position: relative; display: flex; justify-content: center; padding-top: 50px;}
        .pole-stick { width: 50px; height: 100%; background: linear-gradient(to right, #5d4037, #8d6e63, #5d4037); position: relative; border-radius: 10px 10px 0 0; z-index: 5; }
        .pole-star { position: absolute; top: 5px; font-size: 4rem; z-index: 10; }
        .climber-img { position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); font-size: 4.5rem; transition: bottom 0.5s ease-out; z-index: 6; }

        .track-wrapper { display: flex; height: 100%; background: #aed581; }
        .track-lane { flex: 1; position: relative; border-right: 4px dashed rgba(255,255,255,0.5); background: #BEE69E; }
        .finish-line { position: absolute; top: 0; left: 0; width: 100%; height: 40px; background: repeating-linear-gradient(45deg, white, white 15px, black 15px, black 30px); border-bottom: 5px solid white; z-index: 1; }
        .finish-flag { position: absolute; top: 45px; left: 50%; transform: translateX(-50%); font-size: 4rem; opacity: 0.9; }
        .racer-container { position: absolute; bottom: 5%; left: 50%; transform: translateX(-50%); transition: bottom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); display: flex; flex-direction: column; align-items: center; z-index: 5; }
        .racer-emoji { font-size: 4.5rem; }
        .racer-sack { width: 70px; height: 50px; border-radius: 5px 5px 25px 25px; margin-top: -25px; z-index: 3; border: 4px solid rgba(0,0,0,0.2); }
        .sack-p1 { background: #ffb74d; }
        .sack-p2 { background: #4fc3f7; }

        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
        @keyframes bounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
    </style>
</head>
<body>

    <div class="top-controls" id="global-controls">
        <button class="top-btn" onclick="toggleFullScreen()">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"></path></svg>
            Plein écran
        </button>
    </div>

    <div id="homeScreen" class="screen active">
        <h1 class="menu-title">Défi Maths</h1>
        <div class="menu-grid">
            <button class="game-type-btn" onclick="selectGame('tir_corde')"><span>🪢</span><div class="btn-text"><h3>Tir à la Corde</h3><p>Duel de force</p></div></button>
            <button class="game-type-btn" onclick="selectGame('le_mat')"><span>🧗</span><div class="btn-text"><h3>Le Mât</h3><p>Vers le sommet</p></div></button>
            <button class="game-type-btn" onclick="selectGame('course_sac')"><span>🐰</span><div class="btn-text"><h3>Course en Sac</h3><p>Vitesse et rebonds</p></div></button>
        </div>
    </div>

    <div id="opScreen" class="screen">
        <h1 class="menu-title">Quelle activité ?</h1>
        <div class="grid-buttons">
            <button class="big-btn" style="background:#B9F6CA;" onclick="selectOperation('addition')"><span class="icon">➕</span>Addition</button>
            <button class="big-btn" style="background:#81D4FA;" onclick="selectOperation('soustraction')"><span class="icon">➖</span>Soustraction</button>
            <button class="big-btn" style="background:#FFE082;" onclick="selectOperation('multiplication')"><span class="icon">✖️</span>Multiplication</button>
            <button class="big-btn" style="background:#F48FB1;" onclick="selectOperation('division')"><span class="icon">➗</span>Division</button>
            <button class="big-btn" style="background:#FFF9C4;" onclick="selectOperation('doubles')"><span class="icon">👥</span>Les Doubles</button>
            <button class="big-btn" style="background:#FFCCBC;" onclick="selectOperation('moities')"><span class="icon">🍕</span>Les Moitiés</button>
            <button class="big-btn" style="background:#D1C4E9; grid-column: span 2;" onclick="selectOperation('complement')"><span class="icon">🎯</span>Les Compléments</button>
        </div>
        <button class="big-btn" onclick="showScreen('homeScreen')" style="margin-top:20px; width:220px; background:#78909C; color:white; margin-bottom: 20px;">Retour</button>
    </div>

    <div id="difficultyScreen" class="screen">
        <h1 class="menu-title">Difficulté ?</h1>
        <div class="grid-buttons" style="grid-template-columns:1fr;">
            <button class="big-btn" onclick="startGame('niv1')"><span>🌟 Niveau 1</span><small id="desc1"></small></button>
            <button class="big-btn" onclick="startGame('niv2')"><span>⭐ Niveau 2</span><small id="desc2"></small></button>
            <button class="big-btn" onclick="startGame('niv3')"><span>⭐⭐ Niveau 3</span><small id="desc3"></small></button>
            <button class="big-btn" onclick="startGame('niv4')"><span>⭐⭐⭐ Niveau 4</span><small id="desc4"></small></button>
        </div>
        <button class="big-btn" onclick="showScreen('opScreen')" style="margin-top:20px; width:220px; background:#78909C; color:white; margin-bottom: 20px;">Retour</button>
    </div>

    <div id="gameScreen" class="screen" style="overflow:hidden;">
        <div class="top-controls"><button class="top-btn" onclick="retourMenuPrincipal()">🏠 Menu</button></div>
        <div class="duel-container">
            <div class="player-column left">
                <div class="player-header"><span>🐻</span><span id="score1" class="score-badge" style="color:#c62828">0</span></div>
                <div class="question-card"><div id="q1" class="question-text">...</div></div>
                <div id="disp1" class="answer-input"></div>
                <div class="numpad">
                    <button class="num-btn" onclick="inP(1,1)">1</button><button class="num-btn" onclick="inP(1,2)">2</button><button class="num-btn" onclick="inP(1,3)">3</button>
                    <button class="num-btn" onclick="inP(1,4)">4</button><button class="num-btn" onclick="inP(1,5)">5</button><button class="num-btn" onclick="inP(1,6)">6</button>
                    <button class="num-btn" onclick="inP(1,7)">7</button><button class="num-btn" onclick="inP(1,8)">8</button><button class="num-btn" onclick="inP(1,9)">9</button>
                    <button class="num-btn" style="background:#ffcdd2" onclick="delP(1)">⌫</button><button class="num-btn" onclick="inP(1,0)">0</button><button class="num-btn" style="background:#c8e6c9" onclick="chkP(1)">✔</button>
                </div>
            </div>
            <div class="center-column"><div id="gameVisuals" class="game-visual-area"></div></div>
            <div class="player-column right">
                <div class="player-header"><span id="score2" class="score-badge" style="color:#1565c0">0</span><span>🐼</span></div>
                <div class="question-card"><div id="q2" class="question-text">...</div></div>
                <div id="disp2" class="answer-input"></div>
                <div class="numpad">
                    <button class="num-btn" onclick="inP(2,1)">1</button><button class="num-btn" onclick="inP(2,2)">2</button><button class="num-btn" onclick="inP(2,3)">3</button>
                    <button class="num-btn" onclick="inP(2,4)">4</button><button class="num-btn" onclick="inP(2,5)">5</button><button class="num-btn" onclick="inP(2,6)">6</button>
                    <button class="num-btn" onclick="inP(2,7)">7</button><button class="num-btn" onclick="inP(2,8)">8</button><button class="num-btn" onclick="inP(2,9)">9</button>
                    <button class="num-btn" style="background:#ffcdd2" onclick="delP(2)">⌫</button><button class="num-btn" onclick="inP(2,0)">0</button><button class="num-btn" style="background:#c8e6c9" onclick="chkP(2)">✔</button>
                </div>
            </div>
        </div>
    </div>

    <div id="overlayModal" class="modal-overlay"><div id="overlayContent" style="text-align:center; color:white;"></div></div>

    <script>
        let game = { mode: null, op: null, diff: null, active: false, target: 10, p1: { score: 0, ans: '', qVal: 0, history: [] }, p2: { score: 0, ans: '', qVal: 0, history: [] } };

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e => console.log(e));
            else if (document.exitFullscreen) document.exitFullscreen();
        }

        // MODIFICATION : Nouvelle fonction de retour sans reload()
        function retourMenuPrincipal() {
            game.active = false;
            game.p1.score = 0; game.p2.score = 0;
            game.p1.history = []; game.p2.history = [];
            document.getElementById('overlayModal').style.display = 'none';
            showScreen('homeScreen');
        }

        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            const target = document.getElementById(id);
            target.classList.add('active');
            target.scrollTop = 0; // Remonte en haut de page
            document.getElementById('global-controls').style.display = (id === 'gameScreen') ? 'none' : 'flex';
        }
        
        function selectGame(m) { game.mode = m; showScreen('opScreen'); }
        
        function selectOperation(o) { 
            game.op = o; 
            const descs = {
                addition: ["Somme max 10", "Nombres 0-9", "10-19", "Jusqu'à 100"],
                soustraction: ["Max 10", "Nombres 0-9", "10-19", "Jusqu'à 100"],
                multiplication: ["Tables 1,2,5,10", "Tables 2-5", "Tables 2-10", "Tables 2-12"],
                division: ["Diviseurs 1,2,5,10", "Diviseurs 2-5", "Diviseurs 2-10", "Diviseurs 2-12"],
                complement: ["À 10", "À 20", "À 100", "À 1000"],
                doubles: ["Jusqu'à 10+10", "Jusqu'à 20+20", "Jusqu'à 50+50", "Jusqu'à 100+100"],
                moities: ["Jusqu'à 20", "Jusqu'à 40", "Jusqu'à 100", "Jusqu'à 200"]
            };
            for(let i=1; i<=4; i++) document.getElementById('desc'+i).innerText = descs[o][i-1];
            showScreen('difficultyScreen'); 
        }

        function startGame(d) {
            game.diff = d; game.p1.score = 0; game.p2.score = 0;
            game.p1.ans = ''; game.p2.ans = '';
            document.getElementById('disp1').innerText = ''; document.getElementById('disp2').innerText = '';
            setupVisuals(); showScreen('gameScreen'); startCountdown();
        }

        function startCountdown() {
            const el = document.getElementById('overlayModal');
            const content = document.getElementById('overlayContent');
            el.style.display = 'flex';
            let n = 3;
            let t = setInterval(() => {
                if(n > 0) content.innerHTML = `<div style="font-size:10rem; font-weight:bold;">${n}</div>`;
                else if(n === 0) content.innerHTML = `<div style="font-size:8rem; color:#4CAF50;">GO !</div>`;
                else { clearInterval(t); el.style.display = 'none'; game.active = true; genQ(1); genQ(2); }
                n--;
            }, 800);
        }

        function generateSingleQ() {
            let n1, n2, res, txt;
            const r = (min,max) => Math.floor(Math.random()*(max-min+1))+min;
            if (game.op === 'complement') {
                let target = (game.diff==='niv1')?10:(game.diff==='niv2')?20:(game.diff==='niv3')?100:1000;
                n1 = r(1, target-1); res = target - n1; txt = `${n1} + ? = ${target}`;
            } else if (game.op === 'doubles') {
                let max = (game.diff==='niv1')?10:(game.diff==='niv2')?20:(game.diff==='niv3')?50:100;
                n1 = r(1, max); res = n1*2; txt = `${n1} + ${n1} =`;
            } else if (game.op === 'moities') {
                let max = (game.diff==='niv1')?10:(game.diff==='niv2')?20:(game.diff==='niv3')?50:100;
                res = r(1, max); n1 = res*2; txt = `Moitié de ${n1} =`;
            } else if (game.op === 'addition') {
                n1 = r(0, 10); n2 = r(0, 10); res = n1+n2; txt = `${n1} + ${n2} =`;
            } else if (game.op === 'soustraction') {
                n1 = r(5, 20); n2 = r(0, n1); res = n1-n2; txt = `${n1} - ${n2} =`;
            } else if (game.op === 'multiplication') {
                n1 = r(2, 10); n2 = r(2, 10); res = n1*n2; txt = `${n1} × ${n2} =`;
            } else if (game.op === 'division') {
                n2 = r(2, 10); res = r(1, 10); n1 = n2*res; txt = `${n1} : ${n2} =`;
            }
            return { qVal: res, txt: txt };
        }

        function genQ(pNum) {
            let p = pNum === 1 ? game.p1 : game.p2;
            let q = generateSingleQ();
            p.qVal = q.qVal;
            document.getElementById(`q${pNum}`).innerText = q.txt;
        }

        function inP(p, n) { if(game.active) { let obj = p===1?game.p1:game.p2; if(obj.ans.length<5) obj.ans+=n; document.getElementById('disp'+p).innerText = obj.ans; } }
        function delP(p) { if(game.active) { let obj = p===1?game.p1:game.p2; obj.ans = obj.ans.slice(0,-1); document.getElementById('disp'+p).innerText = obj.ans; } }
        function chkP(pNum) {
            if(!game.active) return;
            let p = pNum===1?game.p1:game.p2;
            if(parseInt(p.ans) === p.qVal) {
                p.score++; p.ans = ''; document.getElementById('disp'+pNum).innerText = '';
                flash(pNum, true); updateVisuals(); checkWin(); if(game.active) genQ(pNum);
            } else { p.ans = ''; document.getElementById('disp'+pNum).innerText = ''; flash(pNum, false); }
        }

        function flash(p, ok) {
            const el = document.getElementById('disp'+p);
            el.style.backgroundColor = ok ? '#c8e6c9' : '#ffcdd2';
            setTimeout(() => el.style.backgroundColor = 'white', 300);
        }

        // VISUELS ORIGINAUX (Etoiles et lignes conservées)
        function setupVisuals() {
            const area = document.getElementById('gameVisuals');
            if(game.mode === 'tir_corde') {
                area.innerHTML = `<div class="tug-wrapper"><div class="rope-line"><div id="ropeKnot" class="rope-knot"></div></div><div style="position:absolute;left:10px;font-size:4rem">🐻</div><div style="position:absolute;right:10px;font-size:4rem">🐼</div></div>`;
            } else if(game.mode === 'le_mat') {
                area.innerHTML = `<div class="pole-wrapper">
                    <div class="pole-lane"><div class="pole-star">⭐</div><div class="pole-stick"><div id="vis1" class="climber-img">🐻</div></div></div>
                    <div class="pole-lane"><div class="pole-star">⭐</div><div class="pole-stick"><div id="vis2" class="climber-img">🐼</div></div></div>
                </div>`;
            } else {
                area.innerHTML = `<div class="track-wrapper">
                    <div class="track-lane"><div class="finish-line"></div><div class="finish-flag">🏁</div><div id="vis1" class="racer-container"><div class="racer-emoji">🐻</div><div class="racer-sack sack-p1"></div></div></div>
                    <div class="track-lane"><div class="finish-line"></div><div class="finish-flag">🏁</div><div id="vis2" class="racer-container"><div class="racer-emoji">🐼</div><div class="racer-sack sack-p2"></div></div></div>
                </div>`;
            }
            updateVisuals();
        }

        function updateVisuals() {
            document.getElementById('score1').innerText = game.p1.score;
            document.getElementById('score2').innerText = game.p2.score;
            if(game.mode === 'tir_corde') {
                let diff = game.p2.score - game.p1.score;
                document.getElementById('ropeKnot').style.left = (50 + diff * 4) + '%';
            } else {
                document.getElementById('vis1').style.bottom = Math.min(game.p1.score * 8 + 5, 85) + '%';
                document.getElementById('vis2').style.bottom = Math.min(game.p2.score * 8 + 5, 85) + '%';
            }
        }

        function checkWin() {
            let win = 0;
            if(game.mode === 'tir_corde') {
                if(game.p1.score - game.p2.score >= 10) win = 1;
                else if(game.p2.score - game.p1.score >= 10) win = 2;
            } else {
                if(game.p1.score >= 10) win = 1; else if(game.p2.score >= 10) win = 2;
            }
            if(win > 0) {
                game.active = false;
                const el = document.getElementById('overlayModal');
                el.style.display = 'flex';
                document.getElementById('overlayContent').innerHTML = `
                    <h1 style="font-size:4rem; color:#4CAF50;">VICTOIRE !</h1>
                    <div style="font-size:10rem; animation: bounce 1s infinite;">${win===1?'🐻':'🐼'}</div>
                    <button onclick="retourMenuPrincipal()" style="padding:15px 35px; font-size:2rem; border-radius:40px; border:none; background:#2196F3; color:white; cursor:pointer; margin-top:20px;">Menu Principal</button>
                `;
            }
        }
    </script>
</body>
</html>
